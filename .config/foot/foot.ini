# ───────────────────────────────────────────
# Colors
# ───────────────────────────────────────────
[colors-dark]
foreground=c0caf5
background=000000
regular0=26233a
regular1=eb6f92
regular2=31748f
regular3=f6c177
regular4=9ccfd8
regular5=c4a7e7
regular6=ebbcba
regular7=e0def4
bright0=6e6a86
