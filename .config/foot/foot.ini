# ───────────────────────────────────────────
# Cursor
# ───────────────────────────────────────────
[cursor]
style=block
blink=yes

# ───────────────────────────────────────────
# Mouse
# ───────────────────────────────────────────
[mouse]
hide-when-typing=yes

# ───────────────────────────────────────────
# General Behavior
# ───────────────────────────────────────────
[main]
term=foot
dpi-aware=yes
pad=6x6
