# ---------- Core ----------
set -g mouse on
set -g history-limit 100000
set -g focus-events on
set -sg escape-time 0

# Prefix tuned for FR / BE / ENG layouts (letters + Ctrl are layout-agnostic).
unbind C-b
set -g prefix C-a
set -g prefix2 C-b
bind C-a send-prefix
bind C-b send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"

# Copy mode (vim-style)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ---------- Layout-agnostic bindings ----------
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Keep new panes/windows in the current path
bind c new-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind f run-shell "~/.local/bin/scripts/tmux-sess"

# Pane movement (prefix + hjkl) and resizing (prefix + HJKL)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 5

bind y setw synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"

# ---------- Neovim <-> tmux navigation ----------
set -g @vim_navigator_mapping_left "C-h"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_prev ""
set -g @vim_navigator_disable_when_zoomed "1"

# ---------- Plugins ----------
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @rose_pine_variant 'main' # Options: main, moon, dawn

# Keep compatibility with both historical TPM locations.
if-shell '[ -f ~/.config/tmux/plugins/tpm/tpm ]' "run '~/.config/tmux/plugins/tpm/tpm'"
if-shell '[ -f ~/.config/tmux/tpm/tpm ]' "run '~/.config/tmux/tpm/tpm'"
