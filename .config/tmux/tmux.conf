# ---------- Core ----------
set -g mouse on
set -g history-limit 100000
set -g focus-events on
set -sg escape-time 0

# Prefix tuned for FR / BE / ENG layouts (letters + Ctrl are layout-agnostic).
unbind C-b
set -g prefix C-a
set -g prefix2 C-b
bind C-a send-prefix
bind C-b send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"

# Copy mode (vim-style)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ---------- Layout-agnostic bindings ----------
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Keep new panes/windows in the current path
bind c new-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind f run-shell "~/.local/bin/scripts/tmux-sess"

# Pane movement (prefix + hjkl) and resizing (prefix + HJKL)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 5

bind y setw synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"

# ---------- Neovim <-> tmux navigation ----------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
bind -T copy-mode-vi C-\\ select-pane -l

# ---------- Plugins ----------
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @rose_pine_variant 'main' # Options: main, moon, dawn

# Keep compatibility with both historical TPM locations.
if-shell '[ -f ~/.config/tmux/plugins/tpm/tpm ]' "run '~/.config/tmux/plugins/tpm/tpm'"
if-shell '[ -f ~/.config/tmux/tpm/tpm ]' "run '~/.config/tmux/tpm/tpm'"
